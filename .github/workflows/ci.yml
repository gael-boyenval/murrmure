name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build, test, and pack smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Acceptance tests
        run: pnpm test:acceptance

      - name: Docs proof (phase 10)
        run: pnpm check:docs-proof

      - name: Docs build
        run: pnpm docs:build

      - name: Doc tracker (strict)
        run: pnpm check:doc-tracker:strict

      - name: Pack smoke
        run: |
          set -euo pipefail
          PACK_DIR="$(mktemp -d)"
          WORK_DIR="$(mktemp -d)"

          pnpm -C packages/cli pack --pack-destination "$PACK_DIR"

          CLI_TGZ="$(find "$PACK_DIR" -name 'murrmure-cli-*.tgz' | head -n 1)"
          if [ -z "$CLI_TGZ" ]; then
            echo "CLI tarball not found in $PACK_DIR"
            ls -la "$PACK_DIR"
            exit 1
          fi

          npm install -g "$CLI_TGZ"
          cd "$WORK_DIR"
          mkdir -p murrmure
          mrmr space flow init hello --template hello-gate

          test -f murrmure/flows/hello/flow.manifest.yaml
          test -f murrmure/space/handlers.yaml
