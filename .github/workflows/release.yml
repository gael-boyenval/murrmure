name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Publish requires an npm automation token for the @murrmure scope.
# Add it as a repository secret named NPM_TOKEN in GitHub:
# Settings → Secrets and variables → Actions → New repository secret

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @murrmure/flow-dev-kit
        run: pnpm --filter @murrmure/flow-dev-kit build

      - name: Build @murrmure/cli
        run: pnpm --filter @murrmure/cli build

      - name: Publish packages
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
