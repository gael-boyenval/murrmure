name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Publishes via npm Trusted Publisher (OIDC) — no NPM_TOKEN secret.
# Configure on npmjs.com for @murrmure/cli:
#   Publisher: GitHub Actions
#   Repository: gael-boyenval/murrmure
#   Workflow filename: release.yml

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm (OIDC trusted publishing requires npm ≥ 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @murrmure/cli
        run: pnpm --filter @murrmure/cli build

      - name: Publish packages
        run: pnpm release
