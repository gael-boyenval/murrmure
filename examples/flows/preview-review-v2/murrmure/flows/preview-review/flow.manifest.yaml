# Role: mixed orchestration — write_spec (shell) → build (shell + agent loop) → review → archive → commit.
# Interim linear v2.2 manifest — top-level review until VS-7 nested build.
apiVersion: murrmure.flow/v1
name: preview-review
description: Spec intake → write → build (agent loop) → review → archive → commit

triggers:
  manual: true

start:
  manual: true

steps:
  - id: intake
    description: Human attaches spec markdown.
    presentation:
      view: preview-review-intake
    branches:
      continue:
        schema:
          type: object
          required: [spec_filename, spec_markdown, reviewer]
        next: write_spec
      cancel:
        schema: { type: object }
        next: null
        fail_run: true

  - id: write_spec
    description: Agent writes spec to repo.
    executor:
      action: feature_write_spec
      params:
        spec_markdown: "{{input.spec_markdown}}"
        spec_filename: "{{input.spec_filename}}"
    branches:
      completed:
        schema: { type: object }
        next: build
      failed:
        schema: { type: object }
        next: null
        fail_run: true

  - id: build
    description: Build site; resolve when preview URL is ready.
    executor:
      action: feature_build
      params:
        spec_filename: "{{input.spec_filename}}"
    branches:
      completed:
        schema:
          type: object
          required: [preview_url]
          properties:
            preview_url: { type: string }
        next: review
      failed:
        schema: { type: object }
        next: null
        fail_run: true

  - id: review
    description: Human validates preview.
    presentation:
      view: preview-review
      assignees: ["{{input.reviewer}}"]
    branches:
      validated:
        schema: { type: object }
        next: archive
      changes_required:
        schema:
          type: object
          properties:
            comments: { type: array }
        next: build
      cancel:
        schema: { type: object }
        next: null
        fail_run: true

  - id: archive
    executor:
      action: feature_archive
      params:
        spec_filename: "{{input.spec_filename}}"
    branches:
      completed:
        schema: { type: object }
        next: commit
      failed:
        schema: { type: object }
        next: null
        fail_run: true

  - id: commit
    executor:
      action: feature_commit
      params:
        spec_filename: "{{input.spec_filename}}"
    branches:
      completed:
        schema: { type: object }
        next: null
      failed:
        schema: { type: object }
        next: null
        fail_run: true
