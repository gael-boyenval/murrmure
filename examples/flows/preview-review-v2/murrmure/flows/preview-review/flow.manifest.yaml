# Role: mixed orchestration — write_spec (shell) → build (shell + agent loop) → review → archive → commit.
apiVersion: murrmure.flow/v1
name: preview-review
description: Spec intake → write → build (agent loop) → review → archive → commit

triggers:
  manual: true

start:
  manual: true

steps:
  - id: intake
    checkpoint:
      view: preview-review-intake
      on_resolve:
        default: { goto: write_spec }
        cancel: { fail: true }

  - id: write_spec
    invoke:
      space: "{{origin_space}}"
      action: feature_write_spec
      params:
        spec_markdown: "{{input.spec_markdown}}"
        spec_filename: "{{input.spec_filename}}"

  - id: build
    invoke:
      space: "{{origin_space}}"
      action: feature_build
      params:
        spec_filename: "{{input.spec_filename}}"

  - id: review
    checkpoint:
      view: preview-review
      assignees: ["{{input.reviewer}}"]
      on_resolve:
        when: output.outcome
        values:
          validated: { goto: archive }
          changes_required: { goto: review }
        default: { goto: archive }
        cancel: { fail: true }

  - id: archive
    invoke:
      space: "{{origin_space}}"
      action: feature_archive
      params:
        spec_filename: "{{input.spec_filename}}"

  - id: commit
    invoke:
      space: "{{origin_space}}"
      action: feature_commit
      params:
        spec_filename: "{{input.spec_filename}}"
