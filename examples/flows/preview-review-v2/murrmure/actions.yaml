# Role: indexed invoke targets for preview-review reference workflow.
version: 1
actions:
  run_preview_agent:
    executor: shell
    command: node murrmure/scripts/preview-review-build.mjs
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 120000
  mark_validated:
    executor: shell
    command: echo '{"status":"validated"}'
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 30000
