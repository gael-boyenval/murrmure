# Role: Tutorial 2 orchestrator — open brief then human publish checkpoint.
apiVersion: murrmure.flow/v1
name: team-brief
description: Multi-agent brief orchestrator (indexed v2)

triggers:
  manual: true

start:
  manual: true

steps:
  - id: open
    invoke:
      space: "{{origin_space}}"
      action: team_brief_open
  - id: publish
    gate:
      assignees: ["human:*"]
  - id: done
    invoke:
      space: "{{origin_space}}"
      action: mcp_wake
      params:
        wake_label: handle_brief_published
