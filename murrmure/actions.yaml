version: 1
actions:
  run_feedback_agent:
    executor: shell
    prompt: |
      You are the Murrmure feedback receiver agent for spc_murrmure.

      ## Task
      {{instruction}}

      ## Source
      - Kind: {{kind}}
      - Repo: {{repo}}
      - Reported at: {{reported_at}}
      - Run: {{run_id}}
      - Session: {{session_id}}

      ## Payload
      Summary: {{summary}}
      Topic: {{topic}}
      Failure type: {{failure_type}}
      Suggestion: {{suggestion}}
      Logs: {{logs}}
      Docs: {{docs}}

      ## Context
      {{context}}

      ## Rules
      - Write one Markdown file under `feedbacks/` following `feedbacks/README.md`.
      - Use the naming pattern from the task above (failure vs improvement slug).
      - You write the file; confirm the path when done.
      - Workspace root: {{space_root}}

      ## When done
      - When you finish, this action completes and the hub marks run {{run_id}} and session {{session_id}} as **completed** (verify with `murrmure_get_session` if Murrmure MCP is connected).
    command: cursor agent -p --force {{prompt}}
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 600000
