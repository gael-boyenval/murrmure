version: 1

handlers:
  - id: team-brief-open
    contract_keys: [team-brief.open]
    on: step.opened
    type: shell_spawn
    complete: explicit
    command: echo '{"brief_id":"brf_demo"}'
    prompt: |
      Initialize brief state (stub). Then:
      `murrmure_resolve_step({ run_id: "{{run_id}}", step_id: "open", branch: "completed" })`
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 30000

  - id: team-brief-done
    contract_keys: [team-brief.done]
    on: step.opened
    type: shell_spawn
    complete: explicit
    command: echo '{"wake":"handle_brief_published"}'
    prompt: |
      Signal publish complete (stub). Then:
      `murrmure_resolve_step({ run_id: "{{run_id}}", step_id: "done", branch: "completed" })`
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 30000

  - id: brief-published-wake
    contract_keys: []
    on:
      event:
        type: brief.published
    type: shell_spawn
    complete: auto
    command: echo '{"wake":"handle_brief_published"}'
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 30000
