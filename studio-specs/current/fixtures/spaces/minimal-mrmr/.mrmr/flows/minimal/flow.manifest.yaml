apiVersion: murrmure.flow/v1
name: minimal-flow
description: Smallest strict-apply space — one agent step + handler

triggers:
  manual: true

start:
  manual: true

steps:
  - id: hello
    description: Echo greeting via handler.
    role: agent
    branches:
      completed:
        schema: { type: object }
        next: null
      failed:
        schema: { type: object }
        next: null
        fail_run: true
