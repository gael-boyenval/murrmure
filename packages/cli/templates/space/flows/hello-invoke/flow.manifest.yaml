# Role: minimal handler-backed flow — manual trigger and one step bound to a handler.
apiVersion: murrmure.flow/v1
name: {{FLOW_ID}}
description: Hello flow — single step bound to a handler

triggers:
  manual: true

steps:
  - id: hello
    description: Run hello via handler.
    branches:
      completed:
        schema: { type: object }
        route: { run: completed }
      failed:
        schema: { type: object }
        route: { run: failed }
