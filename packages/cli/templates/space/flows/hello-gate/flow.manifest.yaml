# Role: preview-review loop — intake, build, review, done (step contracts; handlers bind views/actions).
apiVersion: murrmure.flow/v1
name: {{FLOW_ID}}
description: Preview review loop — intake, build, review with explicit branch routing

triggers:
  manual: true

steps:
  - id: intake
    description: Human attaches spec and starts the loop.
    branches:
      continue:
        schema: { type: object }
        route: { step: build }
      cancel:
        schema: { type: object }
        route: { run: failed }

  - id: build
    description: Agent builds preview; resolve when preview URL ready.
    branches:
      completed:
        schema:
          type: object
          required: [preview_url]
          properties:
            preview_url: { type: string }
        route: { step: review }
      failed:
        schema: { type: object }
        route: { run: failed }

  - id: review
    description: Human validates preview — resolve validated or changes_required.
    branches:
      validated:
        schema: { type: object }
        route: { step: done }
      changes_required:
        schema:
          type: object
          properties:
            comments: { type: array }
        route: { step: build }
      cancel:
        schema: { type: object }
        route: { run: failed }

  - id: done
    description: Agent marks validated.
    branches:
      completed:
        schema: { type: object }
        route: { run: completed }
      failed:
        schema: { type: object }
        route: { run: failed }
