# Role: indexed invoke targets for flow steps — merged into murrmure/actions.yaml on scaffold.
version: 1
actions:
  "{{FLOW_ID}}_run_preview_agent":
    executor: shell
    command: node murrmure/scripts/{{FLOW_ID}}-build.mjs
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 120000
  "{{FLOW_ID}}_mark_validated":
    executor: shell
    command: echo '{"status":"validated"}'
    cwd: "{{space_root}}"
    delivery: fail_fast
    timeout_ms: 30000
